<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página não encontrada — HetoAndrade Software</title>
<meta name="robots" content="noindex">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #0a0f1a;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .container { max-width: 500px; padding: 40px 20px; }
  .error-code {
    font-size: 120px;
    font-weight: 800;
    background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
    margin-bottom: 16px;
  }
  h1 { font-size: 24px; font-weight: 600; margin-bottom: 12px; }
  p { font-size: 16px; color: #94a3b8; line-height: 1.7; margin-bottom: 32px; }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 28px;
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: white;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    text-decoration: none;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(59,130,246,0.3);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(59,130,246,0.4); }
  .logo {
    display: flex; align-items: center; gap: 10px;
    justify-content: center; margin-bottom: 40px; text-decoration: none;
  }
  .logo img { width: 36px; height: 36px; border-radius: 8px; }
  .logo-name { font-size: 16px; font-weight: 700; color: #e2e8f0; }
  .logo-sub { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
</style>
</head>
<body>
  <div class="container">
    <a href="/" class="logo">
      <img src="/Imagems/ha_icon_v4.png" alt="HA">
      <div style="text-align:left;">
        <div class="logo-name">HetoAndrade</div>
        <div class="logo-sub">Software</div>
      </div>
    </a>
    <div class="error-code">404</div>
    <h1>Página não encontrada</h1>
    <p>A página que você procura não existe ou foi movida.</p>
    <a href="/" class="btn">Voltar para o início</a>
  </div>
</body>
</html>
